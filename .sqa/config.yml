      github.com/cyfronet-fid/eosc-search-service cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.beady-salmon-ferret.sh
        container: qc.met_clammy-wisteria-gibbon
  QC.Sec:
    repos:
      github.com/cyfronet-fid/eosc-search-service bandit:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-pumpkin-magpie.sh
        container: qc.sec_thirsty-chestnut-chinchilla
  QC.Sty:
    repos:
      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.boozy-bronze-coyote.sh
        container: qc.sty_ugly-firebrick-sheepdog
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-chestnut-mayfly.sh
        container: qc.sty_shabby-burgundy-uguisu
