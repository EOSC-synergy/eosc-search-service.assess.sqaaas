        commands:
        - /usr/bin/env sh .sqa/script.wiggy-sangria-deer.sh
        container: qc.met_tasty-lavender-lizard
  QC.Sec:
    repos:
      github.com/cyfronet-fid/eosc-search-service bandit:
        commands:
        - /usr/bin/env sh .sqa/script.gummy-dandelion-lion.sh
        container: qc.sec_lovely-auburn-cow
  QC.Sty:
    repos:
      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.hazy-flax-lion.sh
        container: qc.sty_sloppy-purple-rabbit
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-carmine-goat.sh
        container: qc.sty_jumpy-pink-llama
