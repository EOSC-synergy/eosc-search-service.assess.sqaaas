config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/cyfronet-fid/eosc-search-service:
      branch: 1628-getting-golden-SQA-badge-v3
      repo: https://github.com/cyfronet-fid/eosc-search-service/
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/cyfronet-fid/eosc-search-service git:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-asparagus-hedgehog.sh
        container: qc.acc_breezy-wheat-mongrel
  QC.Doc:
    repos:
      github.com/cyfronet-fid/eosc-search-service find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-linen-chipmunk.sh
        container: qc.doc_snappy-azure-sheep
      github.com/cyfronet-fid/eosc-search-service git:
        commands:
        - /usr/bin/env sh .sqa/script.surly-cream-moth.sh
        container: qc.doc_queasy-aqua-bombay
      github.com/cyfronet-fid/eosc-search-service markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.stealthy-vermilion-maltese.sh
        container: qc.doc_skinny-periwinkle-worm
  QC.Lic:
    repos:
      github.com/cyfronet-fid/eosc-search-service licensee:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-pear-leopard.sh
        container: qc.lic_greasy-sangria-bison
  QC.Sec:
    repos:
      github.com/cyfronet-fid/eosc-search-service bandit:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-harlequin-dragon.sh
        container: qc.sec_skanky-brass-ladybird
  QC.Sty:
    repos:
      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-ivory-leopard.sh
        container: qc.sty_cranky-aquamarine-dollar
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.scummy-denim-paradise.sh
        container: qc.sty_chewy-rust-barnacle
      github.com/cyfronet-fid/eosc-search-service jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-asparagus-cow.sh
        container: qc.sty_seedy-lime-serval
