    repos:
      github.com/cyfronet-fid/eosc-search-service get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.wimpy-rose-yak.sh
        container: qc.ver_lousy-ochre-pinscher
timeout: 5400
