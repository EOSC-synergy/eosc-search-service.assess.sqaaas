config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/cyfronet-fid/eosc-search-service:
      branch: 1628-getting-golden-SQA-badge-v3
      repo: https://github.com/cyfronet-fid/eosc-search-service
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/cyfronet-fid/eosc-search-service git:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-peach-cow.sh
        container: qc.acc_silly-chestnut-serval
  QC.Doc:
    repos:
      github.com/cyfronet-fid/eosc-search-service find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.gloppy-magenta-dragonfly.sh
        container: qc.doc_skanky-periwinkle-forest
      github.com/cyfronet-fid/eosc-search-service git:
        commands:
        - /usr/bin/env sh .sqa/script.queasy-razzmatazz-greyhound.sh
        container: qc.doc_pasty-flax-terrier
      github.com/cyfronet-fid/eosc-search-service markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-heliotrope-kakapo.sh
        container: qc.doc_zippy-cardinal-dugong
  QC.Lic:
    repos:
      github.com/cyfronet-fid/eosc-search-service licensee:
        commands:
        - /usr/bin/env sh .sqa/script.greasy-apricot-chinook.sh
        container: qc.lic_geeky-brass-skunk
  QC.Met:
    repos:
      github.com/cyfronet-fid/eosc-search-service cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.tacky-carmine-fowl.sh
        container: qc.met_zippy-firebrick-macaw
  QC.Sec:
    repos:
      github.com/cyfronet-fid/eosc-search-service bandit:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-pink-tapir.sh
        container: qc.sec_seedy-ochre-pinscher
  QC.Sty:
    repos:
      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.crabby-mustard-nightingale.sh
        container: qc.sty_squeaky-seashell-zebra
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.messy-bronze-tang.sh
        container: qc.sty_smelly-celadon-markhor
      github.com/cyfronet-fid/eosc-search-service jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-viridian-nightingale.sh
        container: qc.sty_randy-auburn-bobcat
  QC.Uni:
    repos:
      github.com/cyfronet-fid/eosc-search-service pytest:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-gold-badger.sh
        container: qc.uni_whiny-azure-chamois
  QC.Ver:
    repos:
      github.com/cyfronet-fid/eosc-search-service get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-blue-badger.sh
        container: qc.ver_woozy-russet-bombay
timeout: 5400
