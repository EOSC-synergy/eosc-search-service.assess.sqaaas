      github.com/cyfronet-fid/eosc-search-service pytest:
        commands:
        - /usr/bin/env sh .sqa/script.boozy-violet-barb.sh
        container: qc.uni_messy-orange-mandrill
  QC.Ver:
    repos:
      github.com/cyfronet-fid/eosc-search-service get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.dorky-thistle-cow.sh
        container: qc.ver_frumpy-razzmatazz-saola
timeout: 5400
