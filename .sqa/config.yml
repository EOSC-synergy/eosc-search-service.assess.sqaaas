      github.com/cyfronet-fid/eosc-search-service pytest:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-bistre-gecko.sh
        container: qc.uni_messy-linen-quail
  QC.Ver:
    repos:
      github.com/cyfronet-fid/eosc-search-service get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-smalt-molly.sh
        container: qc.ver_lousy-cream-stingray
timeout: 5400
