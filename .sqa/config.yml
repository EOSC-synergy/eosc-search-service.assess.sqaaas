      github.com/cyfronet-fid/eosc-search-service pytest:
        commands:
        - /usr/bin/env sh .sqa/script.clammy-lavender-shrimp.sh
        container: qc.uni_hazy-emerald-sparrow
  QC.Ver:
    repos:
      github.com/cyfronet-fid/eosc-search-service get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-harlequin-cuscus.sh
        container: qc.ver_silly-harlequin-reindeer
timeout: 5400
