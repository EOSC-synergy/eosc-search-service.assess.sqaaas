config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/cyfronet-fid/eosc-search-service:
      branch: 1628-getting-golden-SQA-badge-v3
      repo: https://github.com/cyfronet-fid/eosc-search-service
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/cyfronet-fid/eosc-search-service git:
        commands:
        - /usr/bin/env sh .sqa/script.flimsy-malachite-liger.sh
        container: qc.acc_stealthy-charcoal-dalmatian
  QC.Doc:
    repos:
      github.com/cyfronet-fid/eosc-search-service find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.stinky-amber-wolverine.sh
        container: qc.doc_scummy-sangria-spoonbill
      github.com/cyfronet-fid/eosc-search-service git:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-heliotrope-bullfrog.sh
        container: qc.doc_baggy-brown-chin
      github.com/cyfronet-fid/eosc-search-service markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-goldenrod-hare.sh
        container: qc.doc_stealthy-lime-scorpion
  QC.Lic:
    repos:
      github.com/cyfronet-fid/eosc-search-service licensee:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-lavender-bison.sh
        container: qc.lic_snoopy-aqua-lobster
  QC.Met:
    repos:
      github.com/cyfronet-fid/eosc-search-service cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.jumpy-brass-dormouse.sh
        container: qc.met_squirrely-ultramarine-mandrill
  QC.Sec:
    repos:
      github.com/cyfronet-fid/eosc-search-service bandit:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-scarlet-bandicoot.sh
        container: qc.sec_muzzy-rose-drever
  QC.Sty:
    repos:
      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.zippy-orange-cuttlefish.sh
        container: qc.sty_gamy-magenta-newt
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.surly-corn-monster.sh
        container: qc.sty_wheezy-amethyst-sheepdog
