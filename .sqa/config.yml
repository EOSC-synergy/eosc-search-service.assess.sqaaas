      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.breezy-coral-spaniel.sh
        container: qc.sty_chewy-myrtle-opossum
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.nippy-yellow-terrier.sh
