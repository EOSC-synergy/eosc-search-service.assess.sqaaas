      github.com/cyfronet-fid/eosc-search-service cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.hazy-viridian-ibis.sh
        container: qc.met_sickly-blue-stingray
  QC.Sec:
    repos:
      github.com/cyfronet-fid/eosc-search-service bandit:
        commands:
        - /usr/bin/env sh .sqa/script.tacky-cinnabar-fossa.sh
        container: qc.sec_squirrely-blue-cockroach
  QC.Sty:
    repos:
      github.com/cyfronet-fid/eosc-search-service flake8:
        commands:
        - /usr/bin/env sh .sqa/script.nerdy-orange-lemming.sh
        container: qc.sty_scanty-ecru-otter
      github.com/cyfronet-fid/eosc-search-service hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.cloudy-flax-okapi.sh
        container: qc.sty_woolly-brass-schnauzer
