      github.com/cyfronet-fid/eosc-search-service get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.stinky-cream-kangaroo.sh
        container: qc.ver_muzzy-tomato-frigatebird
timeout: 5400
